services:
  backend:
    build: ./backend
    restart: unless-stopped
    volumes:
      - ./backend/sites.json:/app/sites.json:ro

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend:/usr/share/nginx/frontend:ro
      - ./docs:/usr/share/nginx/docs:ro
    depends_on:
      - backend
